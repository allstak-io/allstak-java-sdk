server.port=8090

# AllStak SDK Configuration
# The ingest host is hardcoded inside the SDK; only the API key and metadata are configurable.
allstak.api-key=ask_live_test_key_for_sample_app
allstak.environment=development
allstak.release=v1.0.0-sample
allstak.debug=true
allstak.service-name=allstak-sample-app
allstak.flush-interval-ms=2000
allstak.buffer-size=100
allstak.capture-http-requests=true
allstak.capture-exceptions=true

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:ordersdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
